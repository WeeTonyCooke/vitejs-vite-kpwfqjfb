<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 700" role="img" aria-labelledby="title desc">
  <title id="title">Moville Festival logo</title>
  <desc id="desc">Simplified lighthouse logo with blue circle and Moville Festival text</desc>
  <defs>
    <style>
      .navy { fill: #27486A; stroke: #27486A; }
      .light { fill: #8FAFD0; stroke: #8FAFD0; }
      .white { fill: #F7F7F7; stroke: #D9D9D9; }
      .line { fill: none; stroke: #27486A; stroke-width: 4; stroke-linecap: round; stroke-linejoin: round; }
      .line2 { fill: none; stroke: #27486A; stroke-width: 3; stroke-linecap: round; stroke-linejoin: round; }
      .outline { fill: none; stroke: #A9B7C8; stroke-width: 2; stroke-linecap: round; stroke-linejoin: round; opacity: .7; }
      text { fill: #27486A; }
    </style>
  </defs>

  <!-- background circle -->
  <circle cx="300" cy="260" r="150" class="light" opacity="0.95"/>

  <!-- top finial -->
  <circle cx="300" cy="53" r="8" fill="#EDEDED"/>
  <rect x="294" y="56" width="12" height="20" rx="4" fill="#F1F1F1"/>

  <!-- lantern roof -->
  <path d="M275 86 L300 68 L325 86 Z" class="white"/>
  <rect x="286" y="86" width="28" height="18" class="white"/>

  <!-- lantern room -->
  <polygon points="275,104 325,104 337,128 263,128" class="white"/>
  <line x1="275" y1="104" x2="263" y2="128" class="outline"/>
  <line x1="325" y1="104" x2="337" y2="128" class="outline"/>
  <line x1="288" y1="104" x2="281" y2="128" class="outline"/>
  <line x1="300" y1="104" x2="300" y2="128" class="outline"/>
  <line x1="312" y1="104" x2="319" y2="128" class="outline"/>
  <!-- blue window pane -->
  <polygon points="313,107 327,107 333,126 319,126" class="navy"/>

  <!-- gallery deck and rail -->
  <rect x="256" y="128" width="88" height="10" class="white"/>
  <rect x="245" y="136" width="110" height="6" class="outline"/>
  <line x1="252" y1="126" x2="252" y2="146" class="outline"/>
  <line x1="348" y1="126" x2="348" y2="146" class="outline"/>
  <line x1="270" y1="128" x2="270" y2="146" class="outline"/>
  <line x1="300" y1="128" x2="300" y2="146" class="outline"/>
  <line x1="330" y1="128" x2="330" y2="146" class="outline"/>

  <!-- main hut -->
  <rect x="245" y="146" width="110" height="64" rx="2" class="white"/>
  <rect x="286" y="168" width="28" height="16" rx="1" class="navy"/>
  <rect x="292" y="171" width="16" height="10" fill="#8FAFD0"/>

  <!-- lower gallery -->
  <rect x="216" y="206" width="168" height="10" class="navy"/>
  <rect x="212" y="214" width="176" height="6" fill="#27486A" opacity="0.75"/>
  <line x1="222" y1="186" x2="222" y2="214" class="outline"/>
  <line x1="378" y1="186" x2="378" y2="214" class="outline"/>
  <line x1="258" y1="186" x2="258" y2="214" class="outline"/>
  <line x1="300" y1="186" x2="300" y2="214" class="outline"/>
  <line x1="342" y1="186" x2="342" y2="214" class="outline"/>

  <!-- central legs and ladder -->
  <line x1="292" y1="216" x2="292" y2="470" class="line"/>
  <line x1="308" y1="216" x2="308" y2="470" class="line"/>
  <line x1="300" y1="216" x2="300" y2="470" class="line2"/>
  <!-- ladder rungs -->
  <g class="line2">
<line x1="292" y1="230" x2="308" y2="230"/>
    <line x1="292" y1="244" x2="308" y2="244"/>
    <line x1="292" y1="258" x2="308" y2="258"/>
    <line x1="292" y1="272" x2="308" y2="272"/>
    <line x1="292" y1="286" x2="308" y2="286"/>
    <line x1="292" y1="300" x2="308" y2="300"/>
    <line x1="292" y1="314" x2="308" y2="314"/>
    <line x1="292" y1="328" x2="308" y2="328"/>
    <line x1="292" y1="342" x2="308" y2="342"/>
    <line x1="292" y1="356" x2="308" y2="356"/>
    <line x1="292" y1="370" x2="308" y2="370"/>
    <line x1="292" y1="384" x2="308" y2="384"/>
    <line x1="292" y1="398" x2="308" y2="398"/>
    <line x1="292" y1="412" x2="308" y2="412"/>
    <line x1="292" y1="426" x2="308" y2="426"/>
    <line x1="292" y1="440" x2="308" y2="440"/>
    <line x1="292" y1="454" x2="308" y2="454"/>
      </g>

  <!-- inner support legs -->
  <line x1="250" y1="216" x2="272" y2="470" class="line"/>
  <line x1="350" y1="216" x2="328" y2="470" class="line"/>
  <line x1="228" y1="216" x2="180" y2="470" class="line"/>
  <line x1="372" y1="216" x2="420" y2="470" class="line"/>

  <!-- outer support legs -->
  <line x1="222" y1="216" x2="150" y2="470" class="line"/>
  <line x1="378" y1="216" x2="450" y2="470" class="line"/>

  <!-- cross braces -->
  <line x1="228" y1="216" x2="272" y2="470" class="line2"/>
  <line x1="250" y1="216" x2="180" y2="470" class="line2"/>
  <line x1="350" y1="216" x2="420" y2="470" class="line2"/>
  <line x1="372" y1="216" x2="328" y2="470" class="line2"/>
  <line x1="150" y1="470" x2="450" y2="470" class="line"/>

  <!-- foot pads -->
  <circle cx="150" cy="470" r="5" class="navy"/>
  <circle cx="228" cy="470" r="5" class="navy"/>
  <circle cx="300" cy="470" r="5" class="navy"/>
  <circle cx="372" cy="470" r="5" class="navy"/>
  <circle cx="450" cy="470" r="5" class="navy"/>

  <!-- wordmark -->
  <text x="300" y="585" text-anchor="middle" font-size="74" font-weight="700" font-family="Georgia, 'Times New Roman', serif">Moville</text>
  <text x="300" y="640" text-anchor="middle" font-size="50" font-weight="600" font-family="Georgia, 'Times New Roman', serif">Festival</text>
</svg>
